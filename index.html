<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loading…</title>
  <script>
    (function () {
      var lang = "greek";
      try {
        var stored = localStorage.getItem("activeLanguage");
        if (stored === "hebrew") lang = "hebrew";
      } catch (_) {}
      if (new URLSearchParams(location.search).get("lang") === "hebrew") lang = "hebrew";
      location.replace(lang === "hebrew"  "dashboard-hebrew.html" : "dashboard.html");
    })();
  </script>
</head>
<body></body>
</html>
