<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting</title>
    <script>
      (function () {
        var base = "/Learn-Biblical-Languages/";
        var target = location.pathname + location.search + location.hash;
        var normalized = target.indexOf(base) === 0 ? target.slice(base.length) : target.replace(/^\//, "");
        location.replace(base + "?redirect=" + encodeURIComponent(normalized));
      })();
    </script>
  </head>
  <body></body>
</html>
